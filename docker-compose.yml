version: '3.9'

services:
  # ─────────────────────────────────────────────────────────────
  # PostgreSQL
  # ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: sgssa-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-sgssa_db}
      POSTGRES_USER: ${DB_USER:-sgssa_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-sgssa_user} -d ${DB_NAME:-sgssa_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [sgssa-net]

  # ─────────────────────────────────────────────────────────────
  # Redis (pour Django Channels)
  # ─────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: sgssa-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [sgssa-net]

  # ─────────────────────────────────────────────────────────────
  # Backend Django (Daphne ASGI)
  # ─────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sgssa-backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      DB_HOST: postgres
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - backend_static:/app/staticfiles
      - backend_media:/app/media
      - backend_logs:/app/logs
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             daphne -b 0.0.0.0 -p 8000 sgssa.asgi:application"
    networks: [sgssa-net]

  # ─────────────────────────────────────────────────────────────
  # Frontend Next.js
  # ─────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sgssa-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://nginx
      NEXT_PUBLIC_WS_URL: ws://nginx
    depends_on:
      - backend
    networks: [sgssa-net]

  # ─────────────────────────────────────────────────────────────
  # Nginx — Reverse Proxy
  # ─────────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: sgssa-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - backend_static:/var/www/static:ro
      - backend_media:/var/www/media:ro
    depends_on:
      - backend
      - frontend
    networks: [sgssa-net]

volumes:
  postgres_data:
  redis_data:
  backend_static:
  backend_media:
  backend_logs:

networks:
  sgssa-net:
    driver: bridge
